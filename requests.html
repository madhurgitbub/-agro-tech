<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Service Requests - AgroTECH</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="header.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f4f9f4 0%, #e8f5e9 100%);
      color: #333;
      min-height: 100vh;
    }
    header {
      background: linear-gradient(90deg, #2e7d32, #66bb6a);
      color: white;
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    .container {
      max-width: 1100px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
      margin-bottom: 30px;
      align-items: center;
    }
    .top-bar h1 {
      font-size: 2rem;
      color: #2e7d32;
      font-weight: bold;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      background: linear-gradient(135deg, #2e7d32 0%, #4caf50 100%);
      color: white;
      text-decoration: none;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 4px 12px rgba(46, 125, 50, 0.3);
    }
    .back-btn:hover {
      background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 100%);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(46, 125, 50, 0.5);
    }
    .back-btn:active {
      transform: translateY(0);
    }
    .requests-grid {
      display: grid;
      gap: 25px;
    }
    .request-card {
      background: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
      transition: all 0.3s ease;
      border: 1px solid #e0e0e0;
    }
    .request-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.15);
    }
    .request-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 15px;
    }
    .request-card h2 {
      margin: 0;
      font-size: 1.5rem;
      color: #2e7d32;
    }
    .request-status {
      display: inline-block;
      padding: 6px 14px;
      background: #e8f5e9;
      color: #2e7d32;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .request-meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }
    .request-meta div {
      background: linear-gradient(135deg, #f5f5f5, #f9f9f9);
      padding: 14px 16px;
      border-radius: 10px;
      border-left: 4px solid #2e7d32;
      color: #444;
      font-size: 0.95rem;
    }
    .request-meta strong {
      color: #2e7d32;
    }
    .request-message {
      margin-bottom: 25px;
      line-height: 1.7;
      color: #555;
      padding: 20px;
      background: linear-gradient(135deg, #f8f9fa, #f0f7da);
      border-radius: 10px;
      border-left: 4px solid #4caf50;
    }
    .chat-section {
      margin-top: 30px;
      border-top: 3px solid #e0e0e0;
      padding-top: 25px;
    }
    .chat-title {
      font-size: 1.2rem;
      color: #2e7d32;
      margin-bottom: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .chat-messages {
      background: #f9f9f9;
      border-radius: 12px;
      padding: 20px;
      max-height: 350px;
      overflow-y: auto;
      margin-bottom: 15px;
      min-height: 120px;
      border: 1px solid #e0e0e0;
    }
    .chat-message {
      margin-bottom: 15px;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 0.95rem;
      line-height: 1.5;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .chat-message.provider {
      background: #e8f5e9;
      border-left: 4px solid #4caf50;
      margin-right: 30px;
    }
    .chat-message.buyer {
      background: #e3f2fd;
      border-left: 4px solid #2196F3;
      margin-left: 30px;
      text-align: right;
    }
    .chat-message.time {
      font-size: 0.8rem;
      color: #999;
      margin-top: 3px;
    }
    .chat-input-group {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }
    .chat-input-group textarea {
      flex: 1;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.95rem;
      resize: vertical;
      transition: border-color 0.3s ease;
    }
    .chat-input-group textarea:focus {
      outline: none;
      border-color: #2e7d32;
    }
    .chat-input-group button {
      padding: 12px 20px;
      background: linear-gradient(135deg, #2e7d32, #4caf50);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .chat-input-group button:hover {
      background: linear-gradient(135deg, #1b5e20, #2e7d32);
      transform: translateY(-2px);
    }
    
    /* Deal Confirmation Section */
    .deal-actions {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-top: 25px;
      padding-top: 25px;
      border-top: 2px solid #e0e0e0;
    }
    
    .deal-btn {
      padding: 14px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.95rem;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
    }
    
    .deal-confirm {
      background: linear-gradient(135deg, #4caf50, #66bb6a);
      color: white;
      box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3);
    }
    
    .deal-confirm:hover {
      background: linear-gradient(135deg, #45a049, #4caf50);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4);
    }
    
    .deal-reject {
      background: linear-gradient(135deg, #f44336, #ef5350);
      color: white;
      box-shadow: 0 4px 12px rgba(244, 67, 54, 0.3);
    }
    
    .deal-reject:hover {
      background: linear-gradient(135deg, #e53935, #f44336);
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(244, 67, 54, 0.4);
    }
    
    .deal-status {
      padding: 15px 20px;
      background: #fff3e0;
      border-left: 4px solid #ff9800;
      border-radius: 8px;
      color: #e65100;
      font-weight: 600;
      text-align: center;
      margin-top: 15px;
    }
    
    .deal-status.confirmed {
      background: #e8f5e9;
      border-left-color: #4caf50;
      color: #2e7d32;
    }
    
    .deal-status.rejected {
      background: #ffebee;
      border-left-color: #f44336;
      color: #c62828;
    }

    @media (max-width: 768px) {
      .container {
        padding: 0 15px;
      }
      .top-bar {
        flex-direction: column;
      }
      .top-bar h1 {
        font-size: 1.5rem;
        width: 100%;
      }
      .request-meta {
        grid-template-columns: 1fr;
      }
      .deal-actions {
        grid-template-columns: 1fr;
      }
      .chat-message.provider {
        margin-right: 0;
      }
      .chat-message.buyer {
        margin-left: 0;
      }
    }
      font-size: 0.95rem;
      resize: vertical;
      min-height: 50px;
    }
    .chat-input-group button {
      padding: 10px 20px;
      background: #4caf50;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }
    .chat-input-group button:hover {
      background: #2e7d32;
    }
    .expand-chat-btn {
      background: #ff9800;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      margin-top: 10px;
      transition: 0.3s;
    }
    .expand-chat-btn:hover {
      background: #f57c00;
    }
    @media (max-width: 800px) {
      .request-meta {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>📬 Service Requests & Deal Discussion</h1>
  </header>

  <div class="container">
    <div class="top-bar">
      <div>
        <h1>Requests from Customers</h1>
      </div>
      <a href="home.html" class="back-btn">← Back to Home</a>
    </div>

    <div class="requests-grid" id="requestsGrid"></div>
  </div>

  <script>
    function loadRequests() {
      const requestsGrid = document.getElementById('requestsGrid');
      const requests = JSON.parse(localStorage.getItem('agrotech_requests') || '[]');

      if (!requests || requests.length === 0) {
        requestsGrid.innerHTML = '<div class="no-requests"><i class="fas fa-inbox"></i><br><br>No service requests available yet. When a customer contacts a provider, the request will show up here.</div>';
        return;
      }

      requestsGrid.innerHTML = requests.reverse().map(request => {
        const dealStatus = localStorage.getItem(`deal_${request.id}`);
        
        return `
          <div class="request-card">
            <div class="request-header">
              <h2>💼 ${request.serviceName}</h2>
              <span class="request-status">Pending</span>
            </div>
            
            <div class="request-meta">
              <div><strong>👤 Buyer Name:</strong> ${request.buyerName}</div>
              <div><strong>📧 Email:</strong> ${request.buyerEmail}</div>
              <div><strong>📱 Your Phone:</strong> ${request.providerPhone}</div>
              <div><strong>⏰ Requested:</strong> ${new Date(request.requestTime).toLocaleString()}</div>
            </div>
            
            <div class="request-message">
              <strong>Initial Message from Buyer:</strong><br>
              ${request.buyerMessage}
            </div>
            
            <div class="chat-section">
              <div class="chat-title">
                <i class="fas fa-comments"></i> Deal Discussion Chat
              </div>
              <div class="chat-messages" id="messages-${request.id}"></div>
              <div class="chat-input-group">
                <textarea id="input-${request.id}" placeholder="Type your message to discuss the deal..."></textarea>
                <button onclick="sendMessage(${request.id})"><i class="fas fa-paper-plane"></i> Send</button>
              </div>
            </div>
            
            <div class="deal-actions" id="deal-actions-${request.id}">
              <button class="deal-confirm" onclick="confirmDeal(${request.id})" ${dealStatus ? 'disabled' : ''}>
                <i class="fas fa-check-circle"></i> Confirm Deal
              </button>
              <button class="deal-reject" onclick="rejectDeal(${request.id})" ${dealStatus === 'rejected' ? 'disabled' : ''}>
                <i class="fas fa-times-circle"></i> Reject
              </button>
            </div>
            
            ${dealStatus ? `<div class="deal-status ${dealStatus}"><i class="fas fa-${dealStatus === 'confirmed' ? 'check' : 'ban'}"></i> Deal ${dealStatus === 'confirmed' ? 'CONFIRMED ✓' : 'REJECTED ✗'}</div>` : ''}
          </div>
        `;
      }).join('');

      loadAllChats();
    }

    function loadChatMessages(requestId) {
      const messagesDiv = document.getElementById(`messages-${requestId}`);
      if (!messagesDiv) return;

      const chats = JSON.parse(localStorage.getItem('agrotech_chats') || '{}');
      const messages = chats[requestId] || [];

      if (messages.length === 0) {
        messagesDiv.innerHTML = '<div style="text-align: center; color: #999; padding: 20px;">No messages yet. Start the discussion!</div>';
      } else {
        messagesDiv.innerHTML = messages.map(msg => `
          <div class="chat-message ${msg.sender}">
            <strong>${msg.sender === 'provider' ? 'You (Provider)' : 'Buyer'}</strong>: ${msg.text}
            <div class="chat-message time">${new Date(msg.timestamp).toLocaleString()}</div>
          </div>
        `).join('');
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      }
    }

    function loadAllChats() {
      const requests = JSON.parse(localStorage.getItem('agrotech_requests') || '[]');
      requests.forEach(request => loadChatMessages(request.id));
    }

    function sendMessage(requestId) {
      const inputDiv = document.getElementById(`input-${requestId}`);
      const text = inputDiv.value.trim();

      if (!text) {
        alert('Please type a message');
        return;
      }

      const chats = JSON.parse(localStorage.getItem('agrotech_chats') || '{}');
      if (!chats[requestId]) chats[requestId] = [];

      chats[requestId].push({
        sender: 'provider',
        text: text,
        timestamp: new Date().toISOString()
      });

      localStorage.setItem('agrotech_chats', JSON.stringify(chats));
      inputDiv.value = '';
      loadChatMessages(requestId);
    }

    function confirmDeal(requestId) {
      localStorage.setItem(`deal_${requestId}`, 'confirmed');
      
      // Add this to myaccount service
      const request = JSON.parse(localStorage.getItem('agrotech_requests') || '[]').find(r => r.id === requestId);
      if (request) {
        const myServices = JSON.parse(localStorage.getItem('agrotech_my_services') || '[]');
        const existingService = myServices.find(s => s.requestId === requestId);
        
        if (!existingService) {
          myServices.push({
            requestId: requestId,
            serviceName: request.serviceName,
            buyerName: request.buyerName,
            buyerEmail: request.buyerEmail,
            price: request.price || 'TBD',
            status: 'active',
            confirmedDate: new Date().toISOString()
          });
          localStorage.setItem('agrotech_my_services', JSON.stringify(myServices));
        }
      }
      
      loadRequests();
      alert('✓ Deal Confirmed! Service added to your "My Services" page.');
    }

    function rejectDeal(requestId) {
      if (confirm('Are you sure you want to reject this deal?')) {
        localStorage.setItem(`deal_${requestId}`, 'rejected');
        loadRequests();
        alert('✗ Deal has been rejected.');
      }
    }

    loadRequests();
  </script>
</body>
</html>
